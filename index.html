<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的黑胶日记</title>
    <style>
        body { background: #000; color: #fff; margin: 0; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .vinyl-container { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; width: 90%; margin: 20px 0; }
        .vinyl { width: 100%; aspect-ratio: 1; border-radius: 50%; background: #222; border: 5px solid #333; display: flex; align-items: center; justify-content: center; position: relative; cursor: pointer; transition: transform 0.3s; }
        .vinyl:hover { transform: scale(1.05); }
        .vinyl img { width: 60%; height: 60%; border-radius: 50%; object-fit: cover; }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); flex-direction: column; justify-content: center; align-items: center; padding: 20px; text-align: center; }
        input, textarea { width: 90%; margin: 10px 0; padding: 15px; border-radius: 8px; border: none; }
        button { background: #1DB954; color: #000; padding: 15px 30px; border: none; border-radius: 20px; font-weight: bold; }
    </style>
</head>
<body>

    <h2 style="margin-top: 30px;">🎵 本月黑胶墙</h2>
    <div class="vinyl-container" id="vinylWall"></div>
    <button onclick="showInput()">+ 添加歌曲</button>

    <!-- 弹窗：输入 -->
    <div id="inputModal" class="modal">
        <input type="text" id="songTitle" placeholder="歌曲名">
        <input type="text" id="imgUrl" placeholder="封面图片链接">
        <textarea id="myThought" placeholder="听歌感想..."></textarea>
        <button onclick="saveEntry()">确认记录</button>
    </div>

    <!-- 弹窗：查看详情 -->
    <div id="viewModal" class="modal" onclick="this.style.display='none'">
        <h2 id="viewTitle"></h2>
        <p id="viewThought" style="width: 80%"></p>
    </div>

    <script>
        let entries = JSON.parse(localStorage.getItem('myVinyls') || '[]');

        function render() {
            const wall = document.getElementById('vinylWall');
            wall.innerHTML = entries.map((e, i) => `
                <div class="vinyl" onclick="viewEntry(${i})">
                    <img src="${e.img}" alt="封面">
                </div>
            `).join('');
        }

        function saveEntry() {
            entries.push({
                title: document.getElementById('songTitle').value,
                img: document.getElementById('imgUrl').value,
                thought: document.getElementById('myThought').value
            });
            localStorage.setItem('myVinyls', JSON.stringify(entries));
            document.getElementById('inputModal').style.display = 'none';
            render();
        }

        function viewEntry(i) {
            document.getElementById('viewTitle').innerText = entries[i].title;
            document.getElementById('viewThought').innerText = entries[i].thought;
            document.getElementById('viewModal').style.display = 'flex';
        }

        function showInput() { document.getElementById('inputModal').style.display = 'flex'; }
        render();
    </script>
</body>
</html>
