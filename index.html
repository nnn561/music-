<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>MUSIC DIARY</title>
    <style>
        body { background: #050505; color: #fff; margin: 0; padding: 20px; font-family: 'Courier New', Courier, monospace; }
        h1 { text-align: center; font-size: 1.5rem; letter-spacing: 8px; color: #333; margin-bottom: 40px; border-bottom: 1px solid #222; padding-bottom: 20px; }
        
        .wall { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; max-width: 600px; margin: 0 auto; }
        
        /* 塑料格挡感：给每一格增加细边框和阴影 */
        .record { width: 100%; aspect-ratio: 1; cursor: pointer; background: #111; border: 2px solid #222; box-shadow: inset 0 0 10px rgba(0,0,0,0.5); position: relative; }
        .record img { width: 100%; height: 100%; object-fit: cover; opacity: 0.8; transition: opacity 0.3s; }
        .record:hover img { opacity: 1; }

        .add-btn { position: fixed; bottom: 30px; right: 30px; background: #fff; border-radius: 50%; width: 50px; height: 50px; font-size: 24px; cursor: pointer; }
        
        #modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); padding: 40px; z-index: 10; }
        input, textarea { width: 100%; background: #000; color: #fff; border: 1px solid #444; padding: 15px; margin: 10px 0; border-radius: 0; }
        .btn-group { display: flex; gap: 10px; }
        button { flex: 1; padding: 15px; border: none; cursor: pointer; }
    </style>
</head>
<body>

    <h1>MUSIC DIARY</h1>
    <div class="wall" id="wall"></div>
    <button class="add-btn" onclick="document.getElementById('modal').style.display='block'">+</button>

    <div id="modal">
        <input type="text" id="sLink" placeholder="粘贴网易云/Spotify链接">
        <textarea id="sNote" rows="3" placeholder="感想..."></textarea>
        <div class="btn-group">
            <button onclick="save()" style="background:#fff">保存记录</button>
            <button onclick="clearAll()" style="background:#f00; color:#fff">清除所有数据</button>
        </div>
    </div>

    <script>
        let data = JSON.parse(localStorage.getItem('vinyls') || '[]');

        function render() {
            document.getElementById('wall').innerHTML = data.map(item => `
                <div class="record" onclick="alert('《${item.name}》\\n${item.note}')">
                    <img src="${item.img || 'https://via.placeholder.com/200?text=No+Cover'}" onerror="this.src='https://via.placeholder.com/200'">
                </div>
            `).join('');
        }

        // 简易抓取逻辑：当用户输入链接后，尝试从链接中提取信息（实际生产中需后端支持）
        function save() {
            const link = document.getElementById('sLink').value;
            const note = document.getElementById('sNote').value;
            // 此处为模拟获取，实际可以通过 oEmbed 协议实现，先存入基本信息
            data.push({ name: link.substring(0, 20), img: '', note: note }); 
            localStorage.setItem('vinyls', JSON.stringify(data));
            document.getElementById('modal').style.display = 'none';
            render();
        }

        function clearAll() {
            if(confirm("确定清空所有回忆吗？")) {
                localStorage.removeItem('vinyls');
                data = [];
                render();
                document.getElementById('modal').style.display = 'none';
            }
        }
        render();
    </script>
</body>
</html>
