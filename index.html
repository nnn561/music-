<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的音乐墙</title>
    <style>
        body { background: #fff; margin: 0; padding: 10px; font-family: sans-serif; }
        
        /* 核心调整：每行 4 个，看起来更紧凑，更有你照片里的感觉 */
        .wall { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; }
        
        .record { width: 100%; aspect-ratio: 1; cursor: pointer; background: #eee; overflow: hidden; }
        .record img { width: 100%; height: 100%; object-fit: cover; }
        
        .add-btn { position: fixed; bottom: 20px; right: 20px; background: #000; color: #fff; border-radius: 50%; width: 50px; height: 50px; border: none; font-size: 24px; }
        
        /* 简单的弹窗 */
        #modal { display: none; position: fixed; inset: 0; background: rgba(255,255,255,0.95); flex-direction: column; padding: 20px; z-index: 10; }
    </style>
</head>
<body>

    <div class="wall" id="wall"></div>
    <button class="add-btn" onclick="document.getElementById('modal').style.display='flex'">+</button>

    <div id="modal" class="modal">
        <input type="text" id="sName" placeholder="歌名">
        <input type="file" id="sImg" accept="image/*">
        <textarea id="sNote" placeholder="感想..."></textarea>
        <button onclick="save()">保存</button>
    </div>

    <script>
        let data = JSON.parse(localStorage.getItem('vinyls') || '[]');
        function render() {
            document.getElementById('wall').innerHTML = data.map((item, i) => `
                <div class="record" onclick="alert('《${item.name}》\\n\\n${item.note}')">
                    <img src="${item.img}">
                </div>
            `).join('');
        }
        function save() {
            const file = document.getElementById('sImg').files[0];
            const reader = new FileReader();
            reader.onload = (e) => {
                data.push({ name: document.getElementById('sName').value, img: e.target.result, note: document.getElementById('sNote').value });
                localStorage.setItem('vinyls', JSON.stringify(data));
                document.getElementById('modal').style.display = 'none';
                render();
            };
            reader.readAsDataURL(file);
        }
        render();
    </script>
</body>
</html>
