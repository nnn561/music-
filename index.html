<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Music Gallery</title>
    <style>
        body { background: #050505; color: #fff; margin: 0; padding: 20px; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }
        h1 { text-align: center; font-size: 1.2rem; letter-spacing: 5px; color: #444; margin-bottom: 30px; }
        
        /* 布局：每行 4 个 */
        .wall { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; max-width: 600px; margin: 0 auto; }
        
        .record { width: 100%; aspect-ratio: 1; cursor: pointer; transition: transform 0.2s; position: relative; }
        .record:hover { transform: scale(1.03); }
        .record img { width: 100%; height: 100%; object-fit: cover; border-radius: 2px; border: 1px solid #1a1a1a; }

        /* 四天一组的视觉分隔 */
        .record:nth-child(4n) { margin-bottom: 20px; }

        .add-btn { position: fixed; bottom: 30px; right: 30px; background: #fff; color: #000; width: 50px; height: 50px; 
                   border-radius: 50%; border: none; font-size: 24px; cursor: pointer; }
        
        #modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); padding: 40px; z-index: 10; }
        input, textarea { width: 100%; background: #111; color: #fff; border: 1px solid #333; padding: 15px; margin: 10px 0; border-radius: 4px; box-sizing: border-box; }
        button.save { background: #fff; color: #000; padding: 15px; width: 100%; border: none; font-weight: bold; }
    </style>
</head>
<body>

    <h1>MY MUSIC GALLERY</h1>
    <div class="wall" id="wall"></div>
    <button class="add-btn" onclick="document.getElementById('modal').style.display='block'">+</button>

    <div id="modal">
        <input type="text" id="sName" placeholder="歌曲名">
        <input type="file" id="sImg" accept="image/*">
        <textarea id="sNote" rows="4" placeholder="写下感想..."></textarea>
        <button class="save" onclick="save()">确认添加</button>
    </div>

    <script>
        let data = JSON.parse(localStorage.getItem('vinyls') || '[]');
        function render() {
            document.getElementById('wall').innerHTML = data.map(item => `
                <div class="record" onclick="alert('《${item.name}》\\n\\n感想：${item.note}')">
                    <img src="${item.img}">
                </div>
            `).join('');
        }
        function save() {
            const file = document.getElementById('sImg').files[0];
            const reader = new FileReader();
            reader.onload = (e) => {
                data.push({ name: document.getElementById('sName').value, img: e.target.result, note: document.getElementById('sNote').value });
                localStorage.setItem('vinyls', JSON.stringify(data));
                document.getElementById('modal').style.display = 'none';
                render();
            };
            reader.readAsDataURL(file);
        }
        render();
    </script>
</body>
</html>
